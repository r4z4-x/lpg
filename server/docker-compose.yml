# Single-node MongoDB replica set for local development.
# Transactions (mandatory for this system) require a replica set.
#
#   docker compose up -d
#   # first time only, the healthcheck initiates rs0 automatically
#
# Connect with:
#   mongodb://127.0.0.1:27017/lpg_dev?replicaSet=rs0&directConnection=true

services:
  mongo:
    image: mongo:7
    container_name: lpg-mongo
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - lpg-mongo-data:/data/db
    healthcheck:
      # Initiate the replica set once mongod is up; idempotent (ignores "already initialized").
      test: >
        mongosh --quiet --eval "
          try { rs.status() } catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '127.0.0.1:27017' }] })
          }
        "
      interval: 10s
      start_period: 20s
      timeout: 10s
      retries: 6

volumes:
  lpg-mongo-data:
